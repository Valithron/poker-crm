name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npm run format:check

      - name: Lint source
        run: npm run lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Report typecheck diagnostics
        if: steps.typecheck.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### TypeScript diagnostics'
            echo
            echo '```text'
            cat typecheck.log
            echo '```'
          } > typecheck-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file typecheck-comment.md

      - name: Enforce typecheck
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Run tests
        run: npm run test

      - name: Build production assets
        run: npm run build
